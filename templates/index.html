   import { blake2s } from "https://cdn.jsdelivr.net/npm/blakejs@1.2.1/+esm";
  const LOCALHOST = "http://172.16.218.128:5000";

  const sensorData = {};
  function computeHash(message) {
    const encoder = new TextEncoder();
    const data = encoder.encode(message);
    const hash = blake2s(data);

    return Array.from(hash)
      .map(b => b.toString(16).padStart(2, '0'))
      .join('');
  }

  function getRandomBytes(length = 32) {
    const arr = new Uint8Array(length);
    crypto.getRandomValues(arr);
    return arr;
  }

  function bytesToHex(bytes) {
    return Array.from(bytes)
      .map(b => b.toString(16).padStart(2, '0'))
      .join('');
  }

function generateShortId(prefix, length = 4) {
  const chars = "0123456789";
  let result = prefix;
  const array = new Uint8Array(length);
  crypto.getRandomValues(array);
  for (let i = 0; i < length; i++) {
    result += chars[array[i] % chars.length];
  }
  return result;
}

function hexSub256(hex1, hex2) {
  const mod = 2n ** 256n;

  const a = BigInt("0x" + hex1);
  const b = BigInt("0x" + hex2);

  const result = (a - b + mod) % mod;

  return result.toString(16).padStart(64, "0");
}

function xorHexWithHex(hex1, hex2) {
  const b1 = hex1.match(/.{1,2}/g).map(b => parseInt(b, 16));
  const b2 = hex2.match(/.{1,2}/g).map(b => parseInt(b, 16));

  const result = b1.map((b, i) => b ^ b2[i]);

  return result.map(b => b.toString(16).padStart(2, '0')).join('');
}

function getDeviceId() {
  
  let id = generateShortId("SEN_");
  
  return id;
}

function getDeviceSecretKey() {
  let id = localStorage.getItem("device_secret_key");

  if (!id) {
    id = generateShortId("SK_",6);
    localStorage.setItem("device_secret_key", id);
  }

  return id;
}

function getDeviceIdentityKey() {

  let id = localStorage.getItem("device_id_key");

  if (!id) {
    id = generateShortId("SID_",6);
    localStorage.setItem("device_id_key", id);
  }

  return id;
}  

function getRandomNumber() {
  return Math.floor(Math.random() * 255) + 1;
}

async function authenticateLAKDToGateway() {
  const T_diff = 10000;

  const arr = new Uint32Array(1);

  const AID = getDeviceId();
  const kS = getDeviceSecretKey(); // Sensor's secret key
  const r0 = getRandomNumber();
  const IDs = getDeviceIdentityKey();

  const b0_concat_result = `${IDs}:${kS}:${r0}`;
  const b0 = computeHash(b0_concat_result);
  
  // Registration - Step 1
  const response = await fetch(`${LOCALHOST}/reg_1`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      AID: AID,
      r0: r0,
      b0: b0
    })

  const data = await response.json();

  // Registration - Step 2
  const gatewayResponse = await fetch(`${LOCALHOST}/reg_2?b0=${b0}`, {
    method: "GET",

  });
  
  const gatewayData = await gatewayResponse.json();

  // Registration - Step 3
  sensorData.KP = gatewayData["KP"];
  sensorData.b1 = gatewayData["b1"];

  const r1_hex = bytesToHex(r1_bytes);

  const now = new Date();

  const d1_concat = `${AID}:${sensorData.b1}:${T1}`;
  const d1_left = computeHash(d1_concat);
  const D1 = xorHexWithHex(d1_left, r1_hex);

  console.log(`D1: ${D1}, ${d1_left} ${r1_hex} `);

  const D2_concat = `${r1_hex}:${T1}:${sensorData.b0}`;
  const D2 = computeHash(D2_concat);

  const M1 = {
    T1: T1,

    D1: D1,

  // Sending to gateway
  const sendToGateway = await fetch(`${LOCALHOST}/auth_1`, {
    method: "POST",

  console.log(`Verification process complete: ${JSON.stringify(M2)}`);
  
  const T3 = now.getTime();
const T2 = Number(M2["T2"]);

if (Math.abs(T3 - T2) <= T_diff) {

  const D5_gateway = M2["D5"];

  console.log(`D5 (sensor): ${D5_hash}`);
  console.log(`D5 (gateway): ${D5_gateway}`);
}
